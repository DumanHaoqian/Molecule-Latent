filename: stage2
stage2_path: /mnt_nas1/haoqian/Data/Molecule/Latent/checkpoints/hf/Mol-Llama-3.1-8B-Instruct
stage1_path: ""
llm_model: meta-llama/Llama-3.1-8B-Instruct

strategy_name: auto
accelerator: gpu
devices:
  - 0
precision: bf16-mixed
max_epochs: 20
check_val_every_n_epoch: 1
save_every_n_epochs: 1
accumulate_grad_batches: 16

weight_decay: 0.05
init_lr: 1.0e-4
min_lr: 5.0e-6
warmup_lr: 1.0e-6
warmup_steps: 1000
scheduler: linear_warmup_cosine_lr

tune_gnn: False
temperature: 0.1
enable_flash: False

use_latent_reasoning: True
num_latent_steps: 4
lambda_latent: 1.0
lambda_lm: 1.0
lambda_cls: 0.5

use_wandb: True
wandb_mode: online
wandb_project: mol-llama-latent
wandb_run_name: stage2-latent-reasoning

