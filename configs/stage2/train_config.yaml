seed: 42
output_dir: outputs/stage2_grpo

llm_model_name_or_path: /path/to/stage1_checkpoint_or_backbone

devices: 1
strategy: auto
precision: bf16-mixed
max_epochs: 1
accumulate_grad_batches: 1
log_every_n_steps: 10

batch_size: 2
num_workers: 4
text_max_len: 512
root: .

num_grpo_generations: 4
max_generation_len: 128
grpo_clip_eps: 0.2
grpo_kl_beta: 0.01
replay_sft_weight: 1.0
rl_weight: 1.0
replay_probability: 0.2

temperature: 1.0
top_p: 0.95
do_sample: true

train_lora_only: true
allow_latent_core_update: false