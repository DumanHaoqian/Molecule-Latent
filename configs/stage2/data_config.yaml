data:
  num_workers: 4
  batch_size: 2
  text_max_len: 512
  latent_slot_text_max_len: 48

  # Replay / SFT sources from Stage I.
  latent_path: "/home/haoqian/Data/Molecule/Datasets/Train/02PubChem/latent_world_modeling.jsonl"
  conversation_path: "/home/haoqian/Data/Molecule/Datasets/Train/01Conversation/conversation_sft_with_worldmodel.jsonl"
  moledit_path: "/home/haoqian/Data/Molecule/Datasets/Train/03MolEdit/mol_edit_with_worldmodel.jsonl"

  # Stage-II unified jsonl converted from TOMG-Bench / OpenMolIns CSV.
  stage2_path: "/home/haoqian/Data/Molecule/Construction/Datasets/05TomgBench/train_small_worldmodel.jsonl"
  # Validation set (same style as Stage-I): three MolEdit test jsons.
  eval_moledit_test_paths:
    - "/home/haoqian/Data/Molecule/Datasets/Test/01_mol_edit/add.json"
    - "/home/haoqian/Data/Molecule/Datasets/Test/01_mol_edit/delete.json"
    - "/home/haoqian/Data/Molecule/Datasets/Test/01_mol_edit/sub.json"
  eval_moledit_sample_per_task: 0

  enabled_sources:
    - pubchem
    - conversation
    - moledit
    - stage2

  replay_sources:
    - pubchem
    - conversation
    - moledit
  rl_sources:
    - stage2

  # Directly control SFT / RL batch ratio.
  # Example: 0.1 SFT + 0.9 RL
  replay_ratio: 0.1
  rl_ratio: 0.9

  # How to mix sources inside each group.
  replay_source_weights:
    pubchem: 0.2
    conversation: 0.3
    moledit: 0.5
  rl_source_weights:
    stage2: 1.0

  # Overall fraction knobs.
  total_data_fraction: 1.0
  total_data_fraction_by_source: {}
  stage2_data_fraction: 0.8

  # Select only specific Stage-II subtasks.
  # Leave empty to use all.
  stage2_subtasks:
    - AtomNum
    - BondNum
    - FunctionalGroup
    - AddComponent
    - SubComponent
    - DelComponent
    - LogP
    - MR
    - QED
  val_subtasks: []

  split_seed: 42
  steps_per_epoch: 0
  fallback_raw_paths: {}
