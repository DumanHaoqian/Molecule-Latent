filename: stage2_grpo

strategy_name: ddp
accelerator: gpu
devices:
  - 0
  - 1
num_nodes: 1
sync_batchnorm: false
precision: bf16-mixed
max_epochs: 1
accumulate_grad_batches: 1
check_val_every_n_epoch: 1
val_check_interval_steps: 200

weight_decay: 0.05
init_lr: 5.0e-6
min_lr: 5.0e-7
warmup_lr: 1.0e-7
warmup_steps: 100
scheduler: linear_warmup_cosine_lr

seed: 42
enable_flash: false

model:
  stage0_checkpoint_path: "/home/haoqian/Data/Molecule/Latent/checkpoints/hf/Mol-Llama-3.1-8B-Instruct"
  stage1_checkpoint_path: "/home/haoqian/Data/Molecule/Latent/checkpoints/stage1/naive-lr-4slots-stepstep=00028024.ckpt"
  stage2_checkpoint_path: ""
  llm_model: "meta-llama/Llama-3.1-8B-Instruct"

stage2:
  num_latent_steps: 4
  max_latent_slots: 4
  num_grpo_generations: 8
  grpo_clip_eps: 0.2
  grpo_kl_beta: 0.003

  generation_max_new_tokens: 128
  generation_min_new_tokens: 1
  generation_top_p: 0.95
  generation_temperature: 1.0
  do_sample: true

  replay_lm_weight: 0.2
  replay_latent_weight: 1.0

  reward_format_weight: 0.5
  reward_validity_weight: 2.0
  reward_task_weight: 3.0
  reward_faithfulness_weight: 1.0
  reward_text_match_weight: 0.5
  similarity_floor: 0.15
  use_length_guard: true
  max_smiles_length: 256

  train_lora_only: true
  allow_latent_core_update: false
  allow_stage1_bridge_update: false

  regression_targets:
    - molecular_weight
    - logp
    - tpsa
    - hbd
    - hba
    - num_rings
    - aromatic_ring_count
    - qed
  classification_targets:
    - ro5_pass
    - ro5_violation_count

use_wandb: true
wandb_mode: online
wandb_project: latent-stage2-grpo
wandb_run_name: stage2-grpo-300-case2-pure-rl
