filename: stage1

strategy_name: auto
accelerator: gpu
devices:
  - 0
precision: bf16-mixed
max_epochs: 5
check_val_every_n_epoch: 1
save_every_n_epochs: 5
accumulate_grad_batches: 1

weight_decay: 0.05
init_lr: 1.0e-4
min_lr: 5.0e-6
warmup_lr: 1.0e-6
warmup_steps: 1000
scheduler: linear_warmup_cosine_lr

tune_gnn: False
temperature: 0.1
seed: 42
enable_flash: False

model:
  stage0_checkpoint_path: "/home/haoqian/Data/Molecule/Latent/checkpoints/hf/Mol-Llama-3.1-8B-Instruct"
  llm_model: "meta-llama/Llama-3.1-8B-Instruct"

stage1_mixed_training: True
use_task_tokens: True
max_latent_slots: 6
latent_slot_text_max_len: 48

source_sampling_weights:
  pubchem: 0.8
  conversation: 0.1
  downstream: 0.1

loss_weights:
  latent: 1.0
  wm: 0.01
  lm: 1
  conv_lm: 1.0
  downstream_lm: 1.0

wm_regression_targets:
  - molecular_weight
  - logp
  - tpsa
  - hbd
  - hba
  - num_rings
  - aromatic_ring_count
  - qed

wm_classification_targets:
  - ro5_pass
  - ro5_violation_count

stage1:
  max_latent_slots: 6
  use_task_tokens: true
  use_mixed_stage1_training: true
  eval_every_n_steps: 500
  eval_before_training: true
  test_results_csv_path: "/home/haoqian/Data/Molecule/Latent/test.csv"
  regression_targets:
    - molecular_weight
    - logp
    - tpsa
    - hbd
    - hba
    - num_rings
    - aromatic_ring_count
    - qed
  classification_targets:
    - ro5_pass
    - ro5_violation_count

use_wandb: True
wandb_mode: online
wandb_project: latent-wm-v1
wandb_run_name: latent-wm-v1
